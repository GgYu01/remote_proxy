name: ci

on:
  push:
  pull_request:

jobs:
  test-and-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.13"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: python3 -m unittest -v

      - name: Run strict audit
        run: python3 scripts/audit_project.py

      - name: Run install simulation
        run: bash tests/simulate_install.sh
